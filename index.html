<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Générateur de CV Professionnel Solidaire</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Force le format A4 */
        #cv-preview {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            box-sizing: border-box;
            background: white;
            transform-origin: top center;
        }

        /* Conteneur d'aperçu adaptatif */
        .preview-wrapper {
            width: 100%;
            height: 85vh; /* Hauteur fixe pour éviter le scroll sur toute la page */
            overflow: auto;
            background-color: #1f2937;
            border-radius: 1rem;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Ajustement dynamique via zoom pour que le A4 tienne dans la largeur */
        #pdf-target-zone {
            width: 210mm;
            height: 297mm;
        }

        @media (max-width: 640px) {
            #cv-preview { zoom: 0.35; }
        }
        @media (min-width: 641px) and (max-width: 1024px) {
            #cv-preview { zoom: 0.5; }
        }
        @media (min-width: 1025px) {
            #cv-preview { zoom: 0.7; }
        }

        .hidden-cv { display: none !important; }
        .cv-bullet-list { list-style-type: disc; padding-left: 18px; margin-top: 4px; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen p-4">
    <script>
        // ... (fonctions ajouterForm, ajouterExp, maj, etc. inchangées) ...

        function telecharger() {
            const element = document.getElementById('cv-preview');
            // Réinitialisation du zoom pour l'export PDF propre
            element.style.transform = "none";
            element.style.zoom = "1";

            const opt = {
                margin: 0,
                filename: 'Mon_CV.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                // Restauration du style après export
                element.style.transform = "";
                element.style.zoom = "";
            });
        }
        // ... (reste du script inchangé) ...
    </script>
</body>
</html>
