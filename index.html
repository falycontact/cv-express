<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Je créé mon CV express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 p-8">

    <div id="login-page" class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">Accès CV Express</h1>
        <p class="mb-4">Connectez-vous à l'aide du code qui vous a été communiqué.</p>
        <input type="password" id="password" class="border p-2 w-full mb-4" placeholder="Code secret">
        <button onclick="checkLogin()" class="bg-blue-600 text-white w-full py-2 rounded">Valider</button>
        <p class="mt-4 text-sm text-gray-500">Un problème de connexion ? Contactez-nous à faly.contact@gmail.com</p>
    </div>

    <div id="app" class="hidden flex gap-8">
        <div class="w-1/2 bg-white p-6 rounded shadow overflow-y-auto h-[90vh]">
            <h1 class="text-2xl font-bold mb-1">Je créé mon CV express</h1>
            <p class="text-sm text-gray-600 mb-6">Remplissez les informations à gauche, l'aperçu se met à jour en temps réel.</p>
            
            <div class="space-y-4">
                <input type="text" placeholder="Prénom" oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase(); updateCV()" class="border p-2 w-full">
                <input type="text" placeholder="NOM" oninput="this.value = this.value.toUpperCase(); updateCV()" class="border p-2 w-full">
                <input type="text" id="job" placeholder="Métier/Projet visé" oninput="updateCV()" class="border p-2 w-full">
                </div>

            <button onclick="downloadPDF()" class="mt-6 bg-green-600 text-white w-full py-2 rounded">Télécharger en PDF (A4)</button>
            <button onclick="resetForm()" class="mt-2 text-red-500 w-full text-sm">Réinitialiser (Données non enregistrées)</button>
        </div>

        <div id="cv-preview" class="w-1/2 bg-white p-8 shadow-lg min-h-[1122px] border">
            <h2 id="display-name" class="text-3xl font-bold"></h2>
            <p id="display-job" class="text-xl text-gray-700"></p>
        </div>
    </div>

    <script>
        function checkLogin() {
            if(document.getElementById('password').value === 'ML2026') {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } else {
                alert('Code incorrect');
            }
        }

        function updateCV() {
            document.getElementById('display-name').innerText = document.querySelector('input[placeholder="Prénom"]').value + ' ' + document.querySelector('input[placeholder="NOM"]').value;
            document.getElementById('display-job').innerText = document.getElementById('job').value;
        }

        function downloadPDF() {
            const element = document.getElementById('cv-preview');
            html2pdf().from(element).save('Mon_CV.pdf');
        }

        function resetForm() {
            if(confirm('Tout effacer ?')) {
                location.reload();
            }
        }
    </script>
</body>
</html>
