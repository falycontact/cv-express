<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de CV</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">

    <!-- ÉCRAN DE VERROUILLAGE -->
    <div id="gatekeeper-screen" class="fixed inset-0 flex items-center justify-center bg-gray-100 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">Accès réservé</h2>
            <input type="password" id="gatekeeper-input" placeholder="Entrez le mot de passe" class="w-full p-2 border rounded mb-4">
            <button onclick="validerAcces()" class="w-full bg-blue-600 text-white py-2 rounded">Valider</button>
        </div>
    </div>

    <!-- APPLICATION (Masquée par défaut) -->
    <div id="app-content" class="hidden p-8">
        <!-- Contenu de l'application -->
        <h1 class="text-2xl font-bold">Générateur de CV</h1>
        <!-- ... reste du contenu ... -->
        <div class="mt-8 text-center text-xs text-gray-500">
            Modèle de CV sur une idée de Faly R.<button onclick="afficherStats()" class="text-blue-600 font-bold underline">®</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mlbjvzzadwjbdaaenfea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sYmp2emFkd2piZGFhZW5mZWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDk2MzgsImV4cCI6MjA5ODkyNTYzOH0.EC3kal19wHH35OnTll2rYnxmQyqzlOghxPdjkPdas5w';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function validerAcces() {
            const pass = document.getElementById('gatekeeper-input').value;
            if (pass === "ML2026") {
                document.getElementById('gatekeeper-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                alert("Mot de passe incorrect.");
            }
        }

        async function afficherStats() {
            try {
                const { data, error } = await supabase.from('stats').select('*');
                if (error) throw error;
                alert('Stats de connexion/téléchargement : ' + JSON.stringify(data));
            } catch (e) { alert('Erreur chargement stats'); }
        }
    </script>
</body>
</html>
