<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de CV Professionnel</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #cv-preview { width: 210mm; min-height: 297mm; padding: 20mm; background: white; }
        .hidden-cv { display: none !important; }
        .preview-wrapper { display: flex; justify-content: center; background-color: #1f2937; padding: 20px; border-radius: 12px; }
        .preview-scale-container { transform-origin: top center; transform: scale(0.5); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- ÉCRAN DE CONNEXION -->
    <div id="gatekeeper-screen" class="fixed inset-0 flex items-center justify-center bg-gray-100 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center w-full max-w-sm">
            <h2 class="text-xl font-bold mb-6 text-gray-800">Accès réservé</h2>
            <input type="password" id="gatekeeper-input" placeholder="Mot de passe" class="w-full p-3 border rounded-xl mb-4 text-center">
            <button onclick="validerAcces()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">Entrer</button>
        </div>
    </div>

    <!-- APPLICATION -->
    <div id="app-content" class="hidden p-6">
        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-md">
                <!-- Formulaire conservé -->
                <button onclick="telecharger()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">📥 Télécharger PDF</button>
            </div>
            <div class="preview-wrapper">
                <div class="preview-scale-container" id="pdf-target-zone">
                    <div id="cv-preview">
                        <!-- Contenu du CV -->
                        <div class="mt-auto border-t pt-4 text-center text-xs text-gray-500">
                            Modèle de CV sur une idée de Faly R.<button onclick="afficherStats()" class="text-blue-600 font-bold underline">®</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient(
            'https://mlbjvzzadwjbdaaenfea.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sYmp2emFkd2piZGFhZW5mZWFlIiwicm9sZSI6Im1hbmFnZXIiLCJpYXQiOjE3ODMzNDk2MzgsImV4cCI6MjA5ODkyNTYzOH0.EC3kal19wHH35OnTll2rYnxmQyqzlOghxPdjkPdas5w'
        );

        function validerAcces() {
            if (document.getElementById('gatekeeper-input').value === "ML2026") {
                document.getElementById('gatekeeper-screen').style.display = 'none';
                document.getElementById('app-content').classList.remove('hidden');
            } else {
                alert("Mot de passe incorrect.");
            }
        }

        async function afficherStats() {
            const { data, error } = await supabase.from('stats').select('*');
            if (error) alert("Erreur de connexion aux stats");
            else alert('Données : ' + JSON.stringify(data));
        }

        function telecharger() {
            const element = document.getElementById('cv-preview');
            html2pdf().from(element).save('CV_Professionnel.pdf');
        }
    </script>
</body>
</html>
