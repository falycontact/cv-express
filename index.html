<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès CV</title>
    <!-- Tailwind pour le style -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <!-- Écran de connexion pur -->
    <div id="gatekeeper-screen" class="bg-white p-10 rounded-2xl shadow-2xl text-center w-80">
        <h2 class="text-xl font-bold mb-6">Accès Sécurisé</h2>
        <input type="password" id="gatekeeper-input" class="w-full p-3 border rounded-xl mb-4 text-center border-gray-300" placeholder="Mot de passe">
        <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">Valider</button>
    </div>

    <!-- Script de vérification immédiat -->
    <script>
        function checkPass() {
            var pass = document.getElementById('gatekeeper-input').value;
            // Vérification stricte
            if (pass === "ML2026") {
                // Redirection vers le contenu réel ou affichage
                document.body.innerHTML = '<div class="p-10 text-center"><h1 class="text-2xl font-bold">Accès autorisé</h1><p>Le système est chargé.</p></div>';
                // Note: Si vous avez votre code complet, remplacez le contenu du body ici.
            } else {
                alert("Mot de passe refusé.");
            }
        }
    </script>
</body>
</html>
