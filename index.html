<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de CV Professionnel</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        #cv-preview { width: 210mm; min-height: 297mm; padding: 20mm; box-sizing: border-box; background: white; }
        .hidden-cv { display: none !important; }
        .preview-wrapper { display: flex; justify-content: center; width: 100%; overflow-x: auto; background-color: #1f2937; padding: 1rem; border-radius: 1rem; }
        .preview-scale-container { transform-origin: top center; background-color: white; transform: scale(0.5); margin-bottom: -370mm; }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <!-- ÉCRAN DE VERROUILLAGE -->
    <div id="gatekeeper-screen" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl text-center z-50 mt-20">
        <h2 class="text-2xl font-bold text-gray-800">Accès Sécurisé</h2>
        <form onsubmit="verifierMotDePasse(event)" class="mt-6 space-y-4">
            <input type="password" id="gatekeeper-input" placeholder="Mot de passe" class="w-full p-3 border rounded-xl text-center outline-none" required>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">Entrer</button>
        </form>
    </div>

    <!-- APPLICATION -->
    <div id="app-content" class="w-full hidden max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
        <div class="bg-white p-6 rounded-2xl shadow-md space-y-6">
            <!-- Formulaire simplifié ici -->
            <button onclick="telecharger()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl">📥 Télécharger PDF</button>
            <button onclick="reinitialiserFormulaire()" class="w-full bg-red-500 text-white py-2 rounded-xl">Réinitialiser</button>
        </div>
        <div class="preview-wrapper">
            <div class="preview-scale-container" id="pdf-target-zone">
                <div id="cv-preview">
                    <!-- Contenu CV -->
                    <div class="mt-auto border-t pt-2 text-center text-xs text-gray-500">
                        Modèle de CV sur une idée de Faly R.<button onclick="afficherStats()" class="text-blue-600 font-bold underline">®</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase Init
        const SUPABASE_URL = 'https://mlbjvzzadwjbdaaenfea.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sYmp2emFkd2piZGFhZW5mZWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDk2MzgsImV4cCI6MjA5ODkyNTYzOH0.EC3kal19wHH35OnTll2rYnxmQyqzlOghxPdjkPdas5w';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function verifierMotDePasse(event) {
            event.preventDefault();
            if(document.getElementById('gatekeeper-input').value === "ML2026") {
                document.getElementById('gatekeeper-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            }
        }

        async function afficherStats() {
            try {
                const { data, error } = await supabase.from('stats').select('*');
                if (error) throw error;
                alert('Stats de connexion/téléchargement : ' + JSON.stringify(data));
            } catch (e) { alert('Erreur chargement stats'); }
        }
    </script>
</body>
</html>
