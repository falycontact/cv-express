<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de CV - Mission Locale</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .drag-hover { border: 2px dashed #4f46e5; background-color: #f5f3ff; }
        @media print {
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen text-slate-800 antialiased pb-12">

    <!-- ÉCRAN DE CONNEXION -->
    <div id="login-screen" class="fixed inset-0 bg-gradient-to-tr from-indigo-600 to-violet-500 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-id-card"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-900 mb-2">Mon CV Mission Locale</h1>
            <p class="text-xs text-slate-500 mb-6">Saisissez le code d'accès de votre conseiller pour commencer.</p>
            
            <div class="mb-4">
                <input type="password" id="access-code" placeholder="Code d'accès" 
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl text-center font-mono text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p id="login-error" class="text-red-500 text-xs mt-2 hidden">Code d'accès incorrect.</p>
            </div>
            
            <button onclick="checkCode()" class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl shadow-md hover:bg-indigo-700 active:scale-[0.98] transition-all">
                Se connecter
            </button>
        </div>
    </div>

    <!-- APPLICATION PRINCIPALE -->
    <div id="app-content" class="hidden max-w-lg mx-auto px-4 pt-6">
        
        <!-- HEADER -->
        <header class="flex items-center justify-between mb-6 bg-white p-4 rounded-xl shadow-xs">
            <div>
                <h1 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <span class="w-3 h-3 bg-emerald-500 rounded-full inline-block animate-pulse"></span>
                    Créateur de CV
                </h1>
                <p class="text-xs text-slate-500">Vos données restent dans votre téléphone.</p>
            </div>
            <button onclick="resetForm()" class="text-xs font-semibold text-red-500 bg-red-50 hover:bg-red-100 px-3 py-2 rounded-lg transition-colors flex items-center gap-1">
                <i class="fa-solid fa-trash-can"></i> Réinitialiser
            </button>
        </header>

        <!-- FORMULAIRE PRINCIPAL -->
        <form id="cv-form" onsubmit="event.preventDefault();" class="space-y-4">
            
            <!-- INFOS PERSONNELLES (Fixe en haut) -->
            <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-100">
                <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider mb-3 flex items-center gap-2 text-indigo-600">
                    <i class="fa-solid fa-user"></i> Informations personnelles
                </h2>
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2">
                        <label class="block text-xs font-medium text-slate-500 mb-1">NOM</label>
                        <input type="text" id="info-nom" oninput="handleNomInput(this)" placeholder="Ex: MARTIN" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-xs font-medium text-slate-500 mb-1">Prénom</label>
                        <input type="text" id="info-prenom" oninput="handlePrenomInput(this)" placeholder="Ex: Lucas" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Téléphone</label>
                        <input type="tel" id="info-tel" placeholder="06 00 00 00 00" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Adresse e-mail</label>
                        <input type="email" id="info-email" placeholder="lucas@mail.com" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <!-- CONTENEUR DES RUBRIQUES INTERVERTIBLES -->
            <div id="sections-container" class="space-y-4">
                
                <!-- RUBRIQUE FORMATIONS -->
                <div data-section-id="formations" class="bg-white p-4 rounded-xl shadow-xs border border-slate-100 section-block transition-all duration-200">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                        <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2 text-indigo-600">
                            <i class="fa-solid fa-graduation-cap"></i> Formations & Diplômes
                        </h2>
                        <div class="flex items-center gap-1 text-slate-400">
                            <button onclick="moveSection('formations', 'up')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Monter"><i class="fa-solid fa-chevron-up text-xs"></i></button>
                            <button onclick="moveSection('formations', 'down')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Descendre"><i class="fa-solid fa-chevron-down text-xs"></i></button>
                        </div>
                    </div>
                    <div id="list-formations" class="space-y-3"></div>
                    <button type="button" onclick="addFormation()" class="mt-3 w-full py-2 bg-slate-50 hover:bg-slate-100 text-indigo-600 text-xs font-semibold rounded-lg border border-dashed border-indigo-200 flex items-center justify-center gap-1 transition-colors">
                        <i class="fa-solid fa-plus"></i> Ajouter une formation
                    </button>
                </div>

                <!-- RUBRIQUE EXPÉRIENCES -->
                <div data-section-id="experiences" class="bg-white p-4 rounded-xl shadow-xs border border-slate-100 section-block transition-all duration-200">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                        <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2 text-indigo-600">
                            <i class="fa-solid fa-briefcase"></i> Expériences Professionnelles
                        </h2>
                        <div class="flex items-center gap-1 text-slate-400">
                            <button onclick="moveSection('experiences', 'up')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Monter"><i class="fa-solid fa-chevron-up text-xs"></i></button>
                            <button onclick="moveSection('experiences', 'down')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Descendre"><i class="fa-solid fa-chevron-down text-xs"></i></button>
                        </div>
                    </div>
                    <div id="list-experiences" class="space-y-4"></div>
                    <button type="button" onclick="addExperience()" class="mt-3 w-full py-2 bg-slate-50 hover:bg-slate-100 text-indigo-600 text-xs font-semibold rounded-lg border border-dashed border-indigo-200 flex items-center justify-center gap-1 transition-colors">
                        <i class="fa-solid fa-plus"></i> Ajouter une expérience
                    </button>
                </div>

                <!-- RUBRIQUE COMPÉTENCES TECHNIQUES -->
                <div data-section-id="competences-tech" class="bg-white p-4 rounded-xl shadow-xs border border-slate-100 section-block transition-all duration-200">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                        <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2 text-indigo-600">
                            <i class="fa-solid fa-gears"></i> Compétences Techniques
                        </h2>
                        <div class="flex items-center gap-1 text-slate-400">
                            <button onclick="moveSection('competences-tech', 'up')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Monter"><i class="fa-solid fa-chevron-up text-xs"></i></button>
                            <button onclick="moveSection('competences-tech', 'down')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Descendre"><i class="fa-solid fa-chevron-down text-xs"></i></button>
                        </div>
                    </div>
                    <div id="list-competences-tech" class="space-y-2"></div>
                    <button type="button" onclick="addCompetenceTech()" class="mt-3 w-full py-2 bg-slate-50 hover:bg-slate-100 text-indigo-600 text-xs font-semibold rounded-lg border border-dashed border-indigo-200 flex items-center justify-center gap-1 transition-colors">
                        <i class="fa-solid fa-plus"></i> Ajouter une compétence tech
                    </button>
                </div>

                <!-- RUBRIQUE LANGUES -->
                <div data-section-id="langues" class="bg-white p-4 rounded-xl shadow-xs border border-slate-100 section-block transition-all duration-200">
                    <div class="flex items-center justify-between mb-3 border-b border-slate-100 pb-2">
                        <h2 class="text-sm font-bold text-slate-900 uppercase tracking-wider flex items-center gap-2 text-indigo-600">
                            <i class="fa-solid fa-language"></i> Compétences Linguistiques
                        </h2>
                        <div class="flex items-center gap-1 text-slate-400">
                            <button onclick="moveSection('langues', 'up')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Monter"><i class="fa-solid fa-chevron-up text-xs"></i></button>
                            <button onclick="moveSection('langues', 'down')" type="button" class="p-1 hover:text-slate-700 hover:bg-slate-100 rounded" title="Descendre"><i class="fa-solid fa-chevron-down text-xs"></i></button>
                        </div>
                    </div>
                    <div id="list-langues" class="space-y-2"></div>
                    <button type="button" onclick="addLangue()" class="mt-3 w-full py-2 bg-slate-50 hover:bg-slate-100 text-indigo-600 text-xs font-semibold rounded-lg border border-dashed border-indigo-200 flex items-center justify-center gap-1 transition-colors">
                        <i class="fa-solid fa-plus"></i> Ajouter une langue
                    </button>
                </div>

            </div>

            <!-- BOUTON D'EXPORT -->
            <div class="pt-2">
                <button type="button" onclick="generatePDF()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 active:scale-[0.99] transition-all flex items-center justify-center gap-2 text-base">
                    <i class="fa-solid fa-file-pdf text-lg"></i> Générer mon CV en PDF
                </button>
            </div>

        </form>
    </div>

    <!-- ÉLÉMENT CACHÉ POUR LE RENDU DU CV PDF -->
    <div id="cv-pdf-template" class="hidden">
        <div style="font-family: 'Helvetica Neue', Arial, sans-serif; padding: 30px; color: #334155; line-height: 1.5; font-size: 13px; background-color: #fff;">
            <!-- Entête -->
            <div style="border-bottom: 2px solid #4f46e5; padding-bottom: 15px; margin-bottom: 20px;">
                <h1 id="pdf-fullname" style="font-size: 26px; font-weight: bold; color: #1e293b; margin: 0; text-transform: uppercase; letter-spacing: 0.5px;"></h1>
                <div style="margin-top: 8px; color: #475569; font-size: 13px;">
                    <span id="pdf-tel" style="margin-right: 15px;"></span>
                    <span id="pdf-email"></span>
                </div>
            </div>
            
            <!-- Zone dynamique triée -->
            <div id="pdf-dynamic-sections" style="display: flex; flex-direction: column; gap: 20px;"></div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const CORRECT_CODE = "ML2026";
        
        // CHARGEMENT INITIAL & EVENEMENTS SAVING
        document.addEventListener("DOMContentLoaded", () => {
            // Vérifier si déjà authentifié dans la session actuelle
            if (sessionStorage.getItem("ml_auth") === "true") {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app-content").classList.remove("hidden");
            }
            
            // Charger les données sauvegardées
            loadFormData();
            
            // Attacher des écouteurs pour la sauvegarde automatique globale sur les inputs standards
            document.getElementById("cv-form").addEventListener("input", debounce(saveFormData, 500));
        });

        // SECURITE - CODE D'ACCES
        function checkCode() {
            const codeInput = document.getElementById("access-code").value;
            if (codeInput === CORRECT_CODE) {
                sessionStorage.setItem("ml_auth", "true");
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("app-content").classList.remove("hidden");
            } else {
                const err = document.getElementById("login-error");
                err.classList.remove("hidden");
                err.classList.add("animate-shake");
            }
        }

        // FORMATAGE TEMPS RÉEL DES INPUTS
        function handleNomInput(input) {
            input.value = input.value.toUpperCase();
        }

        function handlePrenomInput(input) {
            let val = input.value;
            if (val.length > 0) {
                input.value = val.charAt(0).toUpperCase() + val.slice(1);
            }
        }

        function handleMissionsInput(textarea) {
            // Optionnel : on gère la transformation ou on laisse faire l'export natif avec retour à la ligne
            saveFormData();
        }

        // GESTION DE L'ORDRE DES RUBRIQUES
        function moveSection(id, direction) {
            const container = document.getElementById("sections-container");
            const sections = Array.from(container.querySelectorAll('[data-section-id]'));
            const index = sections.findIndex(sec => sec.getAttribute('data-section-id') === id);
            
            if (direction === 'up' && index > 0) {
                container.insertBefore(sections[index], sections[index - 1]);
            } else if (direction === 'down' && index < sections.length - 1) {
                container.insertBefore(sections[index + 1], sections[index]);
            }
            saveFormData();
        }

        // LOGIQUE D'AJOUT DYNAMIQUE DE CHAMPS
        function createUniqueId() { return 'id_' + Math.random().toString(36).substr(2, 9); }

        function addFormation(data = {}) {
            const id = data.id || createUniqueId();
            const html = `
                <div id="${id}" class="bg-slate-50 p-3 rounded-lg border border-slate-200 relative group">
                    <button type="button" onclick="document.getElementById('${id}').remove(); saveFormData();" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="space-y-2 mt-2">
                        <input type="text" placeholder="Intitulé de formation ou diplôme" value="${data.intitule || ''}" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-formation-intitule">
                        <input type="text" placeholder="Nom de l'établissement, ville (département, pays)" value="${data.etablissement || ''}" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-formation-etab">
                        <input type="text" placeholder="Période (ex : 2020-2021)" value="${data.periode || ''}" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-formation-periode">
                    </div>
                </div>
            `;
            document.getElementById("list-formations").insertAdjacentHTML('beforeend', html);
        }

        function addExperience(data = {}) {
            const id = data.id || createUniqueId();
            const html = `
                <div id="${id}" class="bg-slate-50 p-3 rounded-lg border border-slate-200 relative group">
                    <button type="button" onclick="document.getElementById('${id}').remove(); saveFormData();" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 transition-colors">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <div class="space-y-2 mt-2">
                        <input type="text" placeholder="Intitulé du poste" value="${data.poste || ''}" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-exp-poste">
                        <input type="text" placeholder="Nom de l'entreprise, ville (département, pays)" value="${data.entreprise || ''}" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-exp-entreprise">
                        <input type="text" placeholder="Période (ex : 2020-2021)" value="${data.periode || ''}" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-exp-periode">
                        <textarea placeholder="Missions accomplies (une mission par ligne)" rows="3" class="w-full p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-exp-missions" oninput="handleMissionsInput(this)">${data.missions || ''}</textarea>
                    </div>
                </div>
            `;
            document.getElementById("list-experiences").insertAdjacentHTML('beforeend', html);
        }

        function addCompetenceTech(data = {}) {
            const id = data.id || createUniqueId();
            const levels = ["Initiation", "Compétences professionnelles limitées", "Compétences professionnelles complètes", "Expert"];
            let options = levels.map(l => `<option value="${l}" ${data.niveau === l ? 'selected' : ''}>${l}</option>`).join('');
            
            const html = `
                <div id="${id}" class="grid grid-cols-12 gap-2 items-center bg-slate-50 p-2 rounded-lg border border-slate-200">
                    <input type="text" placeholder="Ex: Excel, Accueil client..." value="${data.nom || ''}" class="col-span-6 p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-tech-nom">
                    <select class="col-span-5 p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-tech-niveau">
                        ${options}
                    </select>
                    <button type="button" onclick="document.getElementById('${id}').remove(); saveFormData();" class="col-span-1 text-slate-400 hover:text-red-500 text-center">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `;
            document.getElementById("list-competences-tech").insertAdjacentHTML('beforeend', html);
        }

        function addLangue(data = {}) {
            const id = data.id || createUniqueId();
            const levels = ["Initiation", "Compétences professionnelles limitées", "Compétences professionnelles complètes", "Bilingue", "Langue maternelle"];
            let options = levels.map(l => `<option value="${l}" ${data.niveau === l ? 'selected' : ''}>${l}</option>`).join('');
            
            const html = `
                <div id="${id}" class="grid grid-cols-12 gap-2 items-center bg-slate-50 p-2 rounded-lg border border-slate-200">
                    <input type="text" placeholder="Ex: Anglais, Espagnol..." value="${data.nom || ''}" class="col-span-6 p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-langue-nom">
                    <select class="col-span-5 p-2 bg-white border border-slate-200 rounded text-xs focus:ring-1 focus:ring-indigo-500 form-item-langue-niveau">
                        ${options}
                    </select>
                    <button type="button" onclick="document.getElementById('${id}').remove(); saveFormData();" class="col-span-1 text-slate-400 hover:text-red-500 text-center">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `;
            document.getElementById("list-langues").insertAdjacentHTML('beforeend', html);
        }

        // PERSISTENCE - SAVE & LOAD LOCALSTORAGE
        function saveFormData() {
            const data = {
                nom: document.getElementById("info-nom").value,
                prenom: document.getElementById("info-prenom").value,
                tel: document.getElementById("info-tel").value,
                email: document.getElementById("info-email").value,
                sectionOrder: Array.from(document.getElementById("sections-container").querySelectorAll('[data-section-id]')).map(s => s.getAttribute('data-section-id')),
                formations: [],
                experiences: [],
                competencesTech: [],
                langues: []
            };

            // Formations
            document.querySelectorAll("#list-formations > div").forEach(el => {
                data.formations.push({
                    intitule: el.querySelector(".form-item-formation-intitule").value,
                    etablissement: el.querySelector(".form-item-formation-etab").value,
                    periode: el.querySelector(".form-item-formation-periode").value
                });
            });

            // Expériences
            document.querySelectorAll("#list-experiences > div").forEach(el => {
                data.experiences.push({
                    poste: el.querySelector(".form-item-exp-poste").value,
                    entreprise: el.querySelector(".form-item-exp-entreprise").value,
                    periode: el.querySelector(".form-item-exp-periode").value,
                    missions: el.querySelector(".form-item-exp-missions").value
                });
            });

            // Tech
            document.querySelectorAll("#list-competences-tech > div").forEach(el => {
                data.competencesTech.push({
                    nom: el.querySelector(".form-item-tech-nom").value,
                    niveau: el.querySelector(".form-item-tech-niveau").value
                });
            });

            // Langues
            document.querySelectorAll("#list-langues > div").forEach(el => {
                data.langues.push({
                    nom: el.querySelector(".form-item-langue-nom").value,
                    niveau: el.querySelector(".form-item-langue-niveau").value
                });
            });

            localStorage.setItem("ml_cv_data", JSON.stringify(data));
        }

        function loadFormData() {
            const raw = localStorage.getItem("ml_cv_data");
            if (!raw) {
                // Ajouter des lignes vides par défaut pour guider l'utilisateur
                addFormation();
                addExperience();
                addCompetenceTech();
                addLangue();
                return;
            }

            const data = JSON.parse(raw);
            document.getElementById("info-nom").value = data.nom || "";
            document.getElementById("info-prenom").value = data.prenom || "";
            document.getElementById("info-tel").value = data.tel || "";
            document.getElementById("info-email").value = data.email || "";

            // Ordonner les rubriques selon la sauvegarde
            if (data.sectionOrder) {
                const container = document.getElementById("sections-container");
                data.sectionOrder.forEach(secId => {
                    const block = container.querySelector(`[data-section-id="${secId}"]`);
                    if (block) container.appendChild(block);
                });
            }

            // Remplir les éléments dynamiques
            if (data.formations && data.formations.length > 0) data.formations.forEach(f => addFormation(f));
            else addFormation();

            if (data.experiences && data.experiences.length > 0) data.experiences.forEach(e => addExperience(e));
            else addExperience();

            if (data.competencesTech && data.competencesTech.length > 0) data.competencesTech.forEach(c => addCompetenceTech(c));
            else addCompetenceTech();

            if (data.langues && data.langues.length > 0) data.langues.forEach(l => addLangue(l));
            else addLangue();
        }

        function resetForm() {
            if (confirm("Êtes-vous sûr de vouloir tout effacer ? Cette action videra entièrement le formulaire et supprimera votre sauvegarde locale.")) {
                localStorage.removeItem("ml_cv_data");
                document.getElementById("list-formations").innerHTML = "";
                document.getElementById("list-experiences").innerHTML = "";
                document.getElementById("list-competences-tech").innerHTML = "";
                document.getElementById("list-langues").innerHTML = "";
                document.getElementById("cv-form").reset();
                addFormation();
                addExperience();
                addCompetenceTech();
                addLangue();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // RENDU ET GENERATION DU PDF VIA HTML2PDF
        function generatePDF() {
            // Mettre à jour l'état civil dans le template
            const nom = document.getElementById("info-nom").value.toUpperCase();
            const prenom = document.getElementById("info-prenom").value;
            document.getElementById("pdf-fullname").innerText = `${prenom} ${nom}`.trim() || "MON CV";
            document.getElementById("pdf-tel").innerText = document.getElementById("info-tel").value ? "📞 " + document.getElementById("info-tel").value : "";
            document.getElementById("pdf-email").innerText = document.getElementById("info-email").value ? "✉️ " + document.getElementById("info-email").value : "";

            const pdfDynamicContainer = document.getElementById("pdf-dynamic-sections");
            pdfDynamicContainer.innerHTML = ""; // Clear ancien rendu

            // Récupérer l'ordre actuel des sections du formulaire
            const sectionOrder = Array.from(document.getElementById("sections-container").querySelectorAll('[data-section-id]')).map(s => s.getAttribute('data-section-id'));

            sectionOrder.forEach(secId => {
                if (secId === "formations") {
                    const rows = document.querySelectorAll("#list-formations > div");
                    let hasContent = false;
                    let htmlBlock = `<div style="margin-bottom: 5px;"><h2 style="font-size: 15px; text-transform: uppercase; color: #4f46e5; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; margin-bottom: 10px; font-weight: bold;">Formations & Diplômes</h2>`;
                    
                    rows.forEach(row => {
                        const intitule = row.querySelector(".form-item-formation-intitule").value;
                        const etab = row.querySelector(".form-item-formation-etab").value;
                        const periode = row.querySelector(".form-item-formation-periode").value;
                        
                        if (intitule || etab || periode) {
                            hasContent = true;
                            htmlBlock += `
                                <div style="margin-bottom: 12px;">
                                    <table style="width: 100%; border-collapse: collapse;">
                                        <tr>
                                            <td style="font-weight: bold; color: #1e293b; font-size: 13px;">${intitule || 'Intitulé non renseigné'}</td>
                                            <td style="text-align: right; color: #64748b; font-size: 12px; font-style: italic; width: 120px;">${periode || ''}</td>
                                        </tr>
                                    </table>
                                    <div style="color: #475569; font-size: 12px; margin-top: 2px;">${etab || ''}</div>
                                </div>
                            `;
                        }
                    });
                    htmlBlock += `</div>`;
                    if (hasContent) pdfDynamicContainer.insertAdjacentHTML('beforeend', htmlBlock);

                } else if (secId === "experiences") {
                    const rows = document.querySelectorAll("#list-experiences > div");
                    let hasContent = false;
                    let htmlBlock = `<div style="margin-bottom: 5px;"><h2 style="font-size: 15px; text-transform: uppercase; color: #4f46e5; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; margin-bottom: 10px; font-weight: bold;">Expériences Professionnelles</h2>`;
                    
                    rows.forEach(row => {
                        const poste = row.querySelector(".form-item-exp-poste").value;
                        const entreprise = row.querySelector(".form-item-exp-entreprise").value;
                        const periode = row.querySelector(".form-item-exp-periode").value;
                        const missionsText = row.querySelector(".form-item-exp-missions").value;
                        
                        if (poste || entreprise || periode || missionsText) {
                            hasContent = true;
                            
                            // Génération des puces pour les missions
                            let listItemsHtml = "";
                            if (missionsText.trim()) {
                                const lines = missionsText.split('
');
                                lines.forEach(line => {
                                    if (line.trim()) {
                                        listItemsHtml += `<li style="margin-bottom: 3px; padding-left: 2px;">${line.trim()}</li>`;
                                    }
                                });
                            }

                            htmlBlock += `
                                <div style="margin-bottom: 15px;">
                                    <table style="width: 100%; border-collapse: collapse;">
                                        <tr>
                                            <td style="font-weight: bold; color: #1e293b; font-size: 13px;">${poste || 'Poste non renseigné'}</td>
                                            <td style="text-align: right; color: #64748b; font-size: 12px; font-style: italic; width: 120px;">${periode || ''}</td>
                                        </tr>
                                    </table>
                                    <div style="color: #475569; font-size: 12px; margin-top: 2px; font-weight: 500;">${entreprise || ''}</div>
                                    ${listItemsHtml ? `<ul style="margin: 6px 0 0 0; padding-left: 18px; color: #475569; font-size: 12px; list-style-type: square;">${listItemsHtml}</ul>` : ''}
                                </div>
                            `;
                        }
                    });
                    htmlBlock += `</div>`;
                    if (hasContent) pdfDynamicContainer.insertAdjacentHTML('beforeend', htmlBlock);

                } else if (secId === "competences-tech") {
                    const rows = document.querySelectorAll("#list-competences-tech > div");
                    let hasContent = false;
                    let htmlBlock = `<div style="margin-bottom: 5px;"><h2 style="font-size: 15px; text-transform: uppercase; color: #4f46e5; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; margin-bottom: 10px; font-weight: bold;">Compétences Techniques</h2>`;
                    htmlBlock += `<table style="width: 100%; border-collapse: collapse;">`;
                    
                    rows.forEach(row => {
                        const nomTech = row.querySelector(".form-item-tech-nom").value;
                        const niveauTech = row.querySelector(".form-item-tech-niveau").value;
                        
                        if (nomTech) {
                            hasContent = true;
                            htmlBlock += `
                                <tr style="border-bottom: 1px solid #f1f5f9;">
                                    <td style="padding: 5px 0; font-weight: 500; color: #1e293b; font-size: 12px;">${nomTech}</td>
                                    <td style="padding: 5px 0; text-align: right; color: #64748b; font-size: 12px; font-style: italic;">${niveauTech}</td>
                                </tr>
                            `;
                        }
                    });
                    htmlBlock += `</table></div>`;
                    if (hasContent) pdfDynamicContainer.insertAdjacentHTML('beforeend', htmlBlock);

                } else if (secId === "langues") {
                    const rows = document.querySelectorAll("#list-langues > div");
                    let hasContent = false;
                    let htmlBlock = `<div style="margin-bottom: 5px;"><h2 style="font-size: 15px; text-transform: uppercase; color: #4f46e5; border-bottom: 1px solid #e2e8f0; padding-bottom: 3px; margin-bottom: 10px; font-weight: bold;">Compétences Linguistiques</h2>`;
                    htmlBlock += `<table style="width: 100%; border-collapse: collapse;">`;
                    
                    rows.forEach(row => {
                        const nomLangue = row.querySelector(".form-item-langue-nom").value;
                        const niveauLangue = row.querySelector(".form-item-langue-niveau").value;
                        
                        if (nomLangue) {
                            hasContent = true;
                            htmlBlock += `
                                <tr style="border-bottom: 1px solid #f1f5f9;">
                                    <td style="padding: 5px 0; font-weight: 500; color: #1e293b; font-size: 12px;">${nomLangue}</td>
                                    <td style="padding: 5px 0; text-align: right; color: #64748b; font-size: 12px; font-style: italic;">${niveauLangue}</td>
                                </tr>
                            `;
                        }
                    });
                    htmlBlock += `</table></div>`;
                    if (hasContent) pdfDynamicContainer.insertAdjacentHTML('beforeend', htmlBlock);
                }
            });

            // Lancer le téléchargement html2pdf
            const element = document.getElementById('cv-pdf-template');
            element.classList.remove('hidden'); // Temporairement visible pour la capture
            
            const filenameStr = prenom && nom ? `CV_${prenom}_${nom}.pdf` : 'Mon_CV_Mission_Locale.pdf';
            
            const opt = {
                margin:       10,
                filename:     filenameStr,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.add('hidden'); // Re-cacher après capture
            }).catch(err => {
                console.error("Erreur génération PDF:", err);
                element.classList.add('hidden');
            });
        }

        // UTILITAIRE : Limiter le nombre d'écritures disques (Debounce)
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>
</html>
