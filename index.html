<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de CV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">

    <script>
        // Configuration Supabase
        const SUPABASE_URL = "https://mlbjvzadwjbdaaenfeae.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sYmp2emFkd2piZGFhZW5mZWFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDk2MzgsImV4cCI6MjA5ODkyNTYzOH0.EC3kal19wHH35OnTll2rYnxmQyqzlOghxPdjkPdas5w";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Vérification accès
        window.onload = () => {
            const code = prompt("Veuillez entrer le code d'accès :");
            if (code !== "ML2026") {
                alert("Accès refusé");
                window.location.reload();
            }
        };

        // Formatage texte
        function formaterTexte() {
            let prenom = document.getElementById('in-prenom').value;
            let nom = document.getElementById('in-nom').value;

            if (prenom.length > 0) {
                document.getElementById('in-prenom').value = prenom.charAt(0).toUpperCase() + prenom.slice(1).toLowerCase();
            }
            document.getElementById('in-nom').value = nom.toUpperCase();
            maj(); // Appelle votre fonction de mise à jour existante
        }

        // Réinitialisation
        function reinitialiserFormulaire() {
            if (confirm("Êtes-vous sûr de vouloir effacer toutes vos données ?")) {
                localStorage.removeItem('cv_express_solidaire_backup');
                location.reload();
            }
        }

        // Téléchargement PDF
        function telecharger() {
            const element = document.getElementById('cv-preview');
            // Log statistique
            supabase.from('stats_cv').insert([{ action: 'download' }]).then(() => {
                html2pdf().from(element).save('Mon_CV.pdf');
            });
        }

        // Accès Stats
        async function afficherStats() {
            const { count, error } = await supabase.from('stats_cv').select('*', { count: 'exact', head: true });
            alert("Nombre total de téléchargements : " + (count || 0));
        }
    </script>

    <input type="text" id="in-prenom" oninput="formaterTexte()" placeholder="Prénom">
    <input type="text" id="in-nom" oninput="formaterTexte()" placeholder="NOM">
    
    <button onclick="telecharger()" class="bg-green-600 text-white p-2 rounded">Télécharger en PDF</button>
    <button onclick="reinitialiserFormulaire()" class="bg-red-600 text-white p-2 rounded">Effacer tout</button>

    <footer class="mt-10 text-center">
        <p>Développement du modèle sur une idée de Faly R.<span onclick="afficherStats()" class="cursor-pointer font-bold">®</span></p>
    </footer>

    <div id="cv-preview">
        </div>

</body>
</html>
